services:
  # ── Backend API (Node.js Web Service) ──────────────────────────────────────
  - type: web
    name: fmn-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Set this in Render dashboard → your MySQL connection string
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: SITE_URL
        sync: false          # Set to your frontend Render URL, e.g. https://fmn-news.onrender.com
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: SMTP_HOST
        sync: false          # Optional – only needed for newsletter emails
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # ── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: fmn-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to your backend Render URL, e.g. https://fmn-api.onrender.com/api
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
